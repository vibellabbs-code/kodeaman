# .kodeaman.yml — GitLab Bot (Hono)
#
# Use this configuration in repositories connected to the KodeAman GitLab bot.
# The bot reads this file on every MR event and runs the configured scan.
#
# See docs/gitlab-bot-setup.md for bot installation and webhook setup.

# Language for MR notes and coaching
language: id

# Scanner selection
scanners:
  semgrep: true          # SAST — runs in the bot's container
  zapBaseline: false     # DAST — enable only if the bot has network access to the target
  npmAudit: true         # Dependency vulnerability scan

# Framework preset
presets: []
# presets:
#   - laravel

# Finding prioritization
prioritization:
  maxFindingsInComment: 3    # Top N findings shown in the MR note
  failOnSeverity: high       # Findings at or above this level trigger a warning

# Gamification in MR notes
gamification:
  enabled: true

# Output format
# The bot always posts a Markdown note. Additional formats are optional.
output:
  markdown: true     # MR note (always used by bot)
  sarif: false       # Not applicable for GitLab (use json instead)
  json: false        # Attach JSON artifact
  html: false        # Generate HTML report artifact
